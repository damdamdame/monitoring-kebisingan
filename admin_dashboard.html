<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kontrol Admin IoT - RW 16 Jakasampurna</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }
        .header {
            background-color: #1a252f;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-public {
            background-color: transparent;
            color: white;
            border: 1px solid white;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-public:hover {
            background-color: white;
            color: #1a252f;
        }
        .main-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f4f6f9;
            padding-bottom: 10px;
        }
        .btn-pdf {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        .btn-pdf:hover {
            background-color: #218838;
        }
        .iframe-container {
            width: 100%;
            height: 300px;
            border: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        .control-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .btn-restart {
            width: 100%;
            background-color: #d9534f;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-restart:hover {
            background-color: #c9302c;
        }

        /* Trik Ajaib CSS Khusus untuk Tampilan Cetak PDF */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .header, .btn-public, .btn-pdf, .right-panel {
                display: none !important; /* Hilangkan menu atas, tombol pdf, dan panel tombol restart */
            }
            .main-container {
                display: block; /* Buat layout jadi full semata wayang */
            }
            .card {
                box-shadow: none;
                padding: 0;
                border: none;
            }
            .card-header-flex h3 {
                font-size: 24px;
                margin-bottom: 15px;
            }
            /* Menambahkan judul Kop Surat Laporan Otomatis di PDF */
            .card::before {
                content: "LAPORAN HASIL MONITORING KEBISINGAN\nRW 16 JAKASAMPURNA\n-------------------------------------------------------------";
                white-space: pre-wrap;
                font-size: 20px;
                font-weight: bold;
                display: block;
                margin-bottom: 30px;
                color: #1a252f;
            }
            .iframe-container {
                height: 450px; /* Perbesar grafik biar puas dibaca di PDF */
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Panel Kontrol Admin IoT - RW 16 Jakasampurna</h2>
        <a href="index.html" class="btn-public">Lihat Web Publik</a>
    </div>

    <div class="main-container">
        <!-- Panel Kiri: Grafik & Download PDF -->
        <div class="card">
            <div class="card-header-flex">
                <h3>Grafik Pemantauan Real-Time</h3>
                <button class="btn-pdf" onclick="window.print()">🖨️ Cetak PDF</button>
            </div>
            <div class="iframe-container">
                <iframe src="https://thingspeak.com/channels/3345623/charts/1?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&type=line&update=15"></iframe>
            </div>
        </div>

        <!-- Panel Kanan: Kontrol Hardware -->
        <div class="card right-panel">
            <div class="card-header-flex">
                <h3>Kendali Hardware (Uplink)</h3>
            </div>
            <p class="control-text">
                Fitur ini digunakan untuk memaksa mikrokontroler ESP32 melakukan <i>reboot/restart</i> dari jarak jauh jika terjadi malfungsi pada jaringan lokal.
            </p>
            <button class="btn-restart" onclick="kirimPerintahRestart()">⚡ RESTART PERANGKAT ESP32</button>
        </div>
    </div>

    <script>
        const writeAPIKey = "H6LZ9Z90HCHWBRAB";
        const channelID = "3345623";

        function kirimPerintahRestart() {
            if (confirm("Apakah Anda yakin ingin me-restart perangkat ESP32 secara jarak jauh?")) {
                const url = `https://api.thingspeak.com/update?api_key=${writeAPIKey}&field2=1`;
                
                fetch(url)
                    .then(response => {
                        if (response.ok) {
                            alert("Perintah restart sukses dikirim ke cloud! Perangkat akan reboot dalam 10-15 detik.");
                        } else {
                            alert("Gagal mengirim perintah restart. Coba lagi.");
                        }
                    })
                    .catch(error => {
                        console.error("Error:", error);
                        alert("Terjadi kesalahan koneksi saat mengirim perintah.");
                    });
            }
        }
    </script>
</body>
</html>
