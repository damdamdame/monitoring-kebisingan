<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Monitoring Kebisingan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a1d20; color: white; }
        .card-admin { background-color: #2b3035; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .status-dot { height: 12px; width: 12px; background-color: #28a745; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
    
</head>
<body>
    

    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">ADMIN PANEL - NOISE MONITOR</span>
            <a href="index.html" class="btn btn-outline-info btn-sm">Lihat Tampilan Publik</a>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card card-admin p-4 h-100">
                    <h5 class="text-info fw-bold">Device Status</h5>
                    <hr class="border-secondary">
                    <p class="text-white"><span class="status-dot"></span> Status: <strong>ONLINE</strong></p>
                    <p class="text-white-50 small">IP Address: 192.168.1.45</p>
                    <p class="text-white-50 small">Uptime: 2h 45m</p>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card card-admin p-4 h-100">
                    <h5 class="text-info">Remote Control</h5>
                    <hr class="border-secondary">
                    <div class="d-grid gap-3 d-md-block">
                        <button class="btn btn-outline-warning btn-lg" onclick="location.reload()">Restart ESP32</button>
                    </div>
                    <p class="text-white" >*Gunakan tombol ini hanya untuk pengujian darurat atau pemeliharaan rutin.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
